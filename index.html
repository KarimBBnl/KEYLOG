<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Educativo DAM</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 40px; }
        .monitor { background: #000; border: 1px solid #30363d; height: 500px; overflow-y: auto; padding: 20px; border-radius: 6px; white-space: pre-wrap; color: #39ff14; }
        .status { color: #8b949e; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>[ MONITOR DE EVENTOS ]</h1>
    <div class="status" id="status">Estado: Conectando...</div>
    <div id="log-content" class="monitor">Cargando logs...</div>

    <script>
        async function updateLogs() {
            const display = document.getElementById('log-content');
            const status = document.getElementById('status');
            try {
                // El timestamp (?t=) fuerza la descarga del archivo más reciente
                const response = await fetch('keylog.txt?t=' + Date.now());
                if (!response.ok) throw new Error();
                display.textContent = await response.text();
                status.textContent = "Estado: Sincronizado - " + new Date().toLocaleTimeString();
                display.scrollTop = display.scrollHeight;
            } catch (err) {
                status.textContent = "Estado: Esperando datos de GitHub...";
            }
        }
        setInterval(updateLogs, 5000);
        updateLogs();
    </script>
</body>
</html>
